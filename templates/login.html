<!DOCTYPE html>
<html>

<head>
    <title>ssh-tunnel</title>
    <style>
        body {
            background-color: #ffffff;
            /* 移除底色 */
            color: #000000;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 13px;
            margin: 0;
            padding: 20px;
        }

        .login-box {
            background-color: #ffffff;
            border: 2px solid #b7c5d9;
            /* 加粗线条 */
            padding: 10px;
            width: 300px;
            position: absolute;
            left: 20px;
            top: 20px;
        }

        .login-header {
            background-color: #b7c5d9;
            padding: 2px 5px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        input {
            margin-bottom: 5px;
            width: 90%;
            border: 1px solid #b7c5d9;
        }

        button {
            background-color: #eef2ff;
            border: 1px solid #b7c5d9;
            cursor: pointer;
            padding: 2px 10px;
        }

        button:hover {
            background-color: #d6daf0;
        }

        .error {
            color: #af0a0f;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <div class="login-header">Login</div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div>Username:</div>
            <input type="text" name="username" required>
            <div>Password:</div>
            <input type="password" name="password" required>
            <br>
            <button type="submit">Login</button>
        </form>
    </div>
</body>

</html>
